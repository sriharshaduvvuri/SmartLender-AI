{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="glass-panel p-4 p-md-5 shadow">
            <div class="text-center mb-4">
                <div class="display-5 text-primary mb-2"><i class="bi bi-person-plus-fill"></i></div>
                <h3 class="fw-bold">Register Account</h3>
                <p class="text-secondary small">Create a new credit officer account</p>
            </div>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create password" required>
                    </div>
                    <div class="form-text small text-secondary">Must be at least 6 characters long.</div>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    <i class="bi bi-check-circle-fill me-1"></i> Register Account
                </button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3 small text-secondary">
                Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none text-primary fw-semibold">Sign In here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
