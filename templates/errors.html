{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="col-md-7">
        <div class="glass-panel p-5 text-center shadow">
            <div class="display-3 text-danger mb-3"><i class="bi bi-exclamation-octagon-fill"></i></div>
            <h2 class="fw-bold mb-3">{{ title }}</h2>
            <p class="text-secondary mb-4">{{ message }}</p>
            <a href="{{ url_for('home') }}" class="btn btn-primary px-4">
                <i class="bi bi-house-door-fill me-1"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
