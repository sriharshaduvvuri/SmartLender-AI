{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="glass-panel p-4 p-md-5 shadow">
            <div class="text-center mb-4">
                <div class="display-5 text-primary mb-2"><i class="bi bi-shield-lock-fill"></i></div>
                <h3 class="fw-bold">Sign In</h3>
                <p class="text-secondary small">Access SmartLender underwriting tools</p>
            </div>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3 small text-secondary">
                Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none text-primary fw-semibold">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
